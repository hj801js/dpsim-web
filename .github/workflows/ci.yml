name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run gen:types:snapshot
      - run: npm run build
        env:
          # Next.js reads these at build time; supply safe defaults so the
          # build stage doesn't try to hit a live backend.
          DPSIM_API_URL: http://localhost:8000
